name: Docker

# Publish a multi-arch Docker image to Docker Hub on every version tag push.
# Regular commits to branches do NOT trigger this workflow.
#
# Required GitHub setup:
#   Secrets:   DOCKERHUB_TOKEN  — Docker Hub access token (not account password)
#   Variables: DOCKERHUB_USERNAME — Docker Hub username (public, not a secret)
#
# Create a Docker Hub access token:
#   Hub → Account Settings → Security → New Access Token
#   Scope: Read & Write for the target repository

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  docker:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU enables cross-platform emulation for the nginx:alpine serve stage.
      # The Rust build stage uses --platform=$BUILDPLATFORM so it never runs under QEMU.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}      # GitHub variable (public username)
          password: ${{ secrets.DOCKERHUB_TOKEN }}       # GitHub secret (access token, not password)

      # Generate tags from the git tag:
      #   v1.2.0 → 1.2.0, 1.2, and latest (on default branch)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/tic-tac-toe
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache Rust and npm layers between CI runs (mode=max caches all intermediate layers)
          cache-from: type=gha
          cache-to: type=gha,mode=max
